<!DOCTYPE html>
<html lang="en">
<head>
  <title>Booking place for your dinner!</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="author" content="Saddam Hussain Safi">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-color: #f8f9fa;
    }
    #msg {
      font-weight: bold;
    }
    #submitBtn:disabled {
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <div class="container my-5">
    <div class="card shadow-sm">
      <div class="card-body">
        <h2 class="card-title text-center mb-4">Book Your Dinner</h2>
        <form id="bookingForm" novalidate>
          <div class="mb-3">
            <label for="name" class="form-label">Name</label>
            <input type="text" class="form-control" id="name" placeholder="John Smith" onblur="validateName()">
            <div id="nameFeedback" class="invalid-feedback"></div>
          </div>
          <div class="mb-3">
            <label for="phone" class="form-label">Phone number</label>
            <input type="text" class="form-control" id="phone" placeholder="123456" onblur="validatePhone()">
            <div id="phoneFeedback" class="invalid-feedback"></div>
          </div>
          <fieldset class="mb-3">
            <legend class="col-form-label pt-0">Select a time</legend>
            <div class="form-check">
              <input class="form-check-input" type="radio" name="time" value="05:00" id="t1" checked>
              <label class="form-check-label" for="t1">05:00</label>
            </div>
            <div class="form-check">
              <input class="form-check-input" type="radio" name="time" value="06:00" id="t2">
              <label class="form-check-label" for="t2">06:00</label>
            </div>
            <div class="form-check">
              <input class="form-check-input" type="radio" name="time" value="07:00" id="t3">
              <label class="form-check-label" for="t3">07:00</label>
            </div>
            <div class="form-check">
              <input class="form-check-input" type="radio" name="time" value="08:00" id="t4">
              <label class="form-check-label" for="t4">08:00</label>
            </div>
          </fieldset>
          <fieldset class="mb-4">
            <legend class="col-form-label pt-0">What would you like to have with us?</legend>
            <div class="form-check">
              <input class="form-check-input food" type="checkbox" value="Starters" id="food1">
              <label class="form-check-label" for="food1">Starters</label>
            </div>
            <div class="form-check">
              <input class="form-check-input food" type="checkbox" value="Main_Course" id="food2">
              <label class="form-check-label" for="food2">Main Course</label>
            </div>
            <div class="form-check">
              <input class="form-check-input food" type="checkbox" value="Desserts" id="food3">
              <label class="form-check-label" for="food3">Desserts</label>
            </div>
            <div class="form-check">
              <input class="form-check-input food" type="checkbox" value="Drinks" id="food4">
              <label class="form-check-label" for="food4">Drinks</label>
            </div>
          </fieldset>
          <button type="button" class="btn btn-primary w-100" id="submitBtn" disabled onclick="submitForm()">Submit</button>
        </form>
        <div class="mt-3" id="msg">. . .</div>
      </div>
    </div>
  </div>

  <script>
    function setInvalid(input, feedback, message) {
      input.classList.remove('is-valid');
      input.classList.add('is-invalid');
      feedback.textContent = message;
    }

    function setValid(input) {
      input.classList.remove('is-invalid');
      input.classList.add('is-valid');
    }

    function validateName() {
      const input = document.getElementById('name');
      const feedback = document.getElementById('nameFeedback');
      const name = input.value.trim();

      if (!name) {
        setInvalid(input, feedback, 'Name is required.');
        updateSubmitState();
        return false;
      }
      if (!/\w+\s+\w+/.test(name)) {
        setInvalid(input, feedback, 'First and last name required.');
        updateSubmitState();
        return false;
      }

      setValid(input);
      feedback.textContent = '';
      updateSubmitState();
      return true;
    }

    function validatePhone() {
      const input = document.getElementById('phone');
      const feedback = document.getElementById('phoneFeedback');
      const phone = input.value.trim();

      if (!phone) {
        setInvalid(input, feedback, 'Phone number is required.');
        updateSubmitState();
        return false;
      }
      if (!/^\d{6}$/.test(phone)) {
        setInvalid(input, feedback, 'Phone number must be 6 digits.');
        updateSubmitState();
        return false;
      }

      setValid(input);
      feedback.textContent = '';
      updateSubmitState();
      return true;
    }

    function updateSubmitState() {
      const isNameValid = document.getElementById('name').classList.contains('is-valid');
      const isPhoneValid = document.getElementById('phone').classList.contains('is-valid');
      document.getElementById('submitBtn').disabled = !(isNameValid && isPhoneValid);
    }

    function submitForm() {
      const name = document.getElementById('name').value;
      const phone = document.getElementById('phone').value;
      const time = document.querySelector('input[name="time"]:checked').value;
      const foods = Array.from(document.querySelectorAll('.food:checked')).map(el => el.value).join(' ');
      const msg = document.getElementById('msg');
      msg.textContent = `Reservation for: ${name} Phone: (${phone}) at ${time} Starters are: ${foods || 'None'}`;
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
